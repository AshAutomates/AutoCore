# This GitHub Actions workflow automatically builds and publishes
# the package to PyPI whenever a new release is published on GitHub.

name: Publish to PyPI

# Trigger this workflow only when a new release is published on GitHub
on:
  release:
    types: [published]

# Force all JavaScript-based actions to run on Node.js 24
# to suppress Node.js 20 deprecation warnings from GitHub Actions runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest
    permissions:
      # Required for trusted publishing to PyPI via OIDC (OpenID Connect)
      # OIDC allows GitHub and PyPI to verify each other's identity directly
      # without needing a static PyPI API token stored as a GitHub secret
      id-token: write
    steps:
      # Checkout the repository code
      # actions/checkout is a separate GitHub Actions module (github.com/actions/checkout), currently on v4
      - uses: actions/checkout@v4
      # Set up Python 3.12 environment
      # actions/setup-python is a separate GitHub Actions module (github.com/actions/setup-python), currently on v5
      # Note: v4 and v5 are independent version numbers from their own separate release cycles
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install the build tool to create the package distribution
      - run: pip install build
      # Build the source distribution and wheel
      - run: python -m build
      # Publish the built package to PyPI using trusted publishing
      - uses: pypa/gh-action-pypi-publish@release/v1